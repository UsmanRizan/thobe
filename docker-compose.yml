version: "3.8"

# Thobe Store Docker Compose Configuration
# Deploy with: docker-compose up -d
# Stop with: docker-compose down
# View logs: docker-compose logs -f

services:
  app:
    # Build configuration
    build:
      context: .
      dockerfile: Dockerfile

    # Image name and tag
    image: thobe-app:latest
    container_name: thobe-store

    # Port mappings
    # External port : Internal port
    ports:
      - "80:80" # HTTP for Nginx reverse proxy
      - "3001:3001" # Direct backend API access (optional)

    # Volume mounts for data persistence
    volumes:
      # Database persistence - stores data on host machine
      - thobe-data:/app/data

      # Optional: Mount Nginx config for customization
      # - ./nginx.conf:/etc/nginx/nginx.conf:ro

    # Environment variables from .env file
    env_file:
      - .env

    # Additional environment variables (overrides .env if set)
    environment:
      - NODE_ENV=production
      - PORT=3001

    # Container restart policy
    # unless-stopped: restart on failure but not if manually stopped
    restart: unless-stopped

    # Health check configuration
    healthcheck:
      # Check if backend API is responding
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s # Check every 30 seconds
      timeout: 3s # Allow 3 seconds for response
      retries: 3 # Mark unhealthy after 3 failures
      start_period: 10s # Wait 10 seconds before first check

    # Resource limits (optional, comment out if not needed)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.5'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.25'
    #       memory: 256M

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Named volume for database persistence
# This volume will be created with: docker volume create thobe-data
# Or automatically created by docker-compose
volumes:
  thobe-data:
    driver: local
    # Optional: Use existing volume
    # external: true

# Network configuration (optional)
# networks:
#   thobe-network:
#     driver: bridge

# Example of what to do after deployment:
# docker-compose up -d          # Start in background
# docker-compose logs -f        # Watch logs
# docker-compose ps             # See status
# docker-compose down           # Stop containers
# docker-compose down -v        # Stop and remove volumes (DATA LOSS!)
